AWSTemplateFormatVersion: "2010-09-09"
Description: S3 bucket with encryption, versioning, IAM access policy, and CloudWatch alarms

Parameters:
  ProjectName:
    Type: String
    Default: go-cicd-observability
    Description: Project name used for resource naming
  Environment:
    Type: String
    Default: dev
    Description: Environment name

Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-artifacts-${AWS::Region}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-artifacts"
        - Key: Environment
          Value: !Ref Environment

  ArtifactBucketPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${ProjectName}-s3-access"
      Description: Allows read/write access to the artifact bucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowBucketList
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !GetAtt ArtifactBucket.Arn
          - Sid: AllowObjectAccess
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub "${ArtifactBucket.Arn}/*"

  Bucket4xxErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-bucket-4xx-errors"
      AlarmDescription: Alerts when bucket has elevated client error rate
      Namespace: AWS/S3
      MetricName: 4xxErrors
      Dimensions:
        - Name: BucketName
          Value: !Ref ArtifactBucket
        - Name: FilterId
          Value: EntireBucket
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  BucketSizeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-bucket-size"
      AlarmDescription: Alerts when bucket exceeds size threshold
      Namespace: AWS/S3
      MetricName: BucketSizeBytes
      Dimensions:
        - Name: BucketName
          Value: !Ref ArtifactBucket
        - Name: StorageType
          Value: StandardStorage
      Statistic: Average
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 5368709120
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching


Outputs:
  BucketName:
    Description: Artifact bucket name
    Value: !Ref ArtifactBucket
  BucketArn:
    Description: Artifact bucket ARN
    Value: !GetAtt ArtifactBucket.Arn
  PolicyArn:
    Description: S3 access policy ARN
    Value: !Ref ArtifactBucketPolicy
  ErrorAlarmArn:
    Description: 4xx errors alarm ARN
    Value: !GetAtt Bucket4xxErrorsAlarm.Arn
  SizeAlarmArn:
    Description: Bucket size alarm ARN
    Value: !GetAtt BucketSizeAlarm.Arn
