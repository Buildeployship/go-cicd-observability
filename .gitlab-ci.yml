stages:
  - lint
  - test
  - build
  - scan
  - push
  - mirror

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

lint:
  stage: lint
  image: golangci/golangci-lint:latest
  script:
    - golangci-lint run --timeout=5m
  only:
    - main
    - merge_requests

test:
  stage: test
  image: golang:1.26-alpine
  before_script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
  script:
    - go vet ./...
    - govulncheck ./...
    - go test -v ./...
  only:
    - main
    - merge_requests

build:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--insecure-registry=gitlab:5050"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    CI_REGISTRY: gitlab:5050
    DOCKER_BUILDKIT: "0"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .
    - docker save $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest > image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 hour
  only:
    - main

# trivy scanning
scan:
  stage: scan
  image:
    name: aquasec/trivy:0.69.3
    entrypoint: [""]
  script:
    - trivy image --input image.tar --exit-code 1 --severity HIGH,CRITICAL --quiet
  dependencies:
    - build
  allow_failure: true
  only:
    - main

push:
  stage: push
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--insecure-registry=gitlab:5050"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    CI_REGISTRY: gitlab:5050
    DOCKER_BUILDKIT: "0"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker load < image.tar
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest
  dependencies:
    - build
  only:
    - main

mirror-to-github:
  stage: mirror
  image: alpine:latest
  before_script:
    - apk add --no-cache git
    - git config --global user.email "197860382+Buildeployship@users.noreply.github.com"
    - git config --global user.name "Buildeployship"
  script:
    - git remote add github https://$GITHUB_TOKEN@github.com/Buildeployship/$CI_PROJECT_NAME.git || true
    - git push github HEAD:refs/heads/main --force
  only:
    - main
